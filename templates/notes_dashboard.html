<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; max-width: 860px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    h1 { font-size: 1.4rem; }
    button { padding: 0.4rem 0.9rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; background: #333; color: #fff; }
    button:hover { background: #555; }
    button.ghost { background: #fff; color: #333; border: 1px solid #ccc; }
    button.ghost:hover { background: #f0f0f0; }

    /* Book index */
    #book-index { display: none; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 0.75rem 1.25rem; margin-bottom: 1.5rem; }
    .index-inner { display: flex; flex-wrap: wrap; gap: 0.25rem 0; align-items: baseline; }
    .index-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 0.75rem; flex-shrink: 0; }
    .index-inner a { color: #444; text-decoration: none; font-size: 0.85rem; white-space: nowrap; }
    .index-inner a:hover { text-decoration: underline; color: #111; }
    .index-sep { color: #ccc; margin: 0 0.5rem; font-size: 0.85rem; }

    /* Collapsible books */
    details { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 1.25rem; overflow: hidden; }
    details summary {
      list-style: none; cursor: pointer; user-select: none;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 1.25rem; background: #fafafa;
    }
    details summary::-webkit-details-marker { display: none; }
    details[open] summary { border-bottom: 1px solid #e8e8e8; }
    .summary-left { display: flex; align-items: center; gap: 0.6rem; }
    .chevron { font-size: 0.8rem; color: #bbb; transition: transform 0.15s; flex-shrink: 0; }
    details[open] .chevron { transform: rotate(180deg); }
    .book-title { font-weight: 600; font-size: 1rem; }
    .book-meta { font-size: 0.78rem; color: #aaa; }
    .book-actions { display: flex; gap: 0.4rem; align-items: center; padding: 0.6rem 1.25rem; border-bottom: 1px solid #f0f0f0; background: #fdfdfd; }
    table { width: 100%; border-collapse: collapse; }
    tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }
    td { padding: 0.5rem 1.25rem; font-size: 0.85rem; vertical-align: top; }
    td:last-child { text-align: right; white-space: nowrap; vertical-align: middle; }
    .note-id { font-family: monospace; color: #555; }
    .note-snippet { font-size: 0.78rem; color: #999; margin-top: 0.2rem; font-style: italic; max-width: 500px; }
    .actions { display: inline-flex; gap: 0.3rem; }
    .msg { color: #999; font-size: 0.85rem; font-style: italic; }

    /* PDF overlay */
    #pdf-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 100; justify-content: center; align-items: center;
    }
    #pdf-overlay.visible { display: flex; }
    #pdf-overlay .inner { position: relative; width: 90vw; height: 90vh; background: #fff; border-radius: 8px; overflow: hidden; }
    #pdf-overlay iframe { width: 100%; height: 100%; border: none; }
    #pdf-overlay .close-btn { position: absolute; top: 0.5rem; right: 0.75rem; font-size: 1.5rem; background: none; border: none; color: #555; cursor: pointer; z-index: 1; }
  </style>
</head>
<body>
  <header>
    <h1>Notes</h1>
    <button class="ghost" onclick="loadNotes()">Refresh</button>
  </header>

  <nav id="book-index">
    <div class="index-inner"></div>
  </nav>

  <div id="content"><p class="msg">Loading…</p></div>

  <div id="pdf-overlay" onclick="if(event.target===this)closePdf()">
    <div class="inner">
      <button class="close-btn" onclick="closePdf()">&times;</button>
      <iframe id="pdf-frame"></iframe>
    </div>
  </div>

  <script>
    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function bookId(course) {
      return 'book-' + course.replace(/[^a-z0-9]/gi, '-');
    }

    async function loadNotes() {
      const el = document.getElementById('content');
      const idx = document.getElementById('book-index');
      el.innerHTML = '<p class="msg">Loading…</p>';
      idx.style.display = 'none';
      try {
        const r = await fetch('/notes/');
        if (!r.ok) { el.innerHTML = `<p class="msg">Error ${r.status}.</p>`; return; }
        const notes = await r.json();

        if (!notes.length) { el.innerHTML = '<p class="msg">No notes yet.</p>'; return; }

        const masters = new Set(notes.filter(n => n.id.endsWith('/master')).map(n => n.id.slice(0, -7)));
        const individual = notes.filter(n => !n.id.endsWith('/master'));

        const books = {};
        for (const n of individual) {
          const slash = n.id.indexOf('/');
          const course = slash >= 0 ? n.id.slice(0, slash) : '';
          (books[course] = books[course] || []).push(n);
        }

        // Index
        const courses = Object.keys(books);
        const indexLinks = courses.map((course, i) => {
          const title = prettify(course);
          const count = books[course].length;
          const sep = i < courses.length - 1 ? '<span class="index-sep">·</span>' : '';
          return `<a href="#${bookId(course)}">${escHtml(title)}</a><span class="book-meta" style="margin-left:0.2rem">(${count})</span>${sep}`;
        }).join('');
        idx.querySelector('.index-inner').innerHTML = `<span class="index-label">Books</span>${indexLinks}`;
        idx.style.display = 'block';

        // Books
        let html = '';
        for (const [course, entries] of Object.entries(books)) {
          const title = prettify(course);
          const hasMaster = masters.has(course);
          const id = bookId(course);
          html += `<details id="${id}" open>
            <summary>
              <div class="summary-left">
                <span class="book-title">${escHtml(title)}</span>
                <span class="book-meta">${entries.length} note${entries.length !== 1 ? 's' : ''}</span>
              </div>
              <span class="chevron">&#9660;</span>
            </summary>`;
          if (hasMaster) {
            html += `<div class="book-actions">
              <button class="ghost" onclick="viewPdf('${course}/master')">view PDF</button>
              <button class="ghost" onclick="dlFile('${course}/master','pdf')">↓ PDF</button>
            </div>`;
          }
          html += `<table><tbody>`;
          for (const n of entries) {
            html += `<tr>
              <td>
                <div class="note-id">${escHtml(n.id)}</div>
                ${n.snippet ? `<div class="note-snippet">${escHtml(n.snippet)}</div>` : ''}
              </td>
              <td><div class="actions">
                <button class="ghost" onclick="dlFile('${n.id}','tex')">↓ tex</button>
                <button class="ghost" onclick="viewPdf('${n.id}')">view PDF</button>
                <button class="ghost" onclick="dlFile('${n.id}','pdf')">↓ PDF</button>
              </div></td>
            </tr>`;
          }
          html += '</tbody></table></details>';
        }
        el.innerHTML = html;
      } catch (e) {
        el.innerHTML = `<p class="msg" style="color:#c0392b">${e}</p>`;
      }
    }

    function prettify(course) {
      return (course || 'Uncategorized').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    async function dlFile(path, fmt) {
      try {
        const r = await fetch(`/notes/${path}.${fmt}`);
        if (r.ok) {
          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `${path.split('/').pop()}.${fmt}`; a.click();
          URL.revokeObjectURL(url);
        } else {
          const data = await r.json();
          alert(`Error ${r.status}: ${data.detail}`);
        }
      } catch (e) { alert(e); }
    }

    async function viewPdf(path) {
      try {
        const r = await fetch(`/notes/${path}.pdf`);
        if (r.ok) {
          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          document.getElementById('pdf-frame').src = url;
          document.getElementById('pdf-overlay').classList.add('visible');
        } else {
          const data = await r.json();
          alert(`Error ${r.status}: ${data.detail}`);
        }
      } catch (e) { alert(e); }
    }

    function closePdf() {
      const frame = document.getElementById('pdf-frame');
      document.getElementById('pdf-overlay').classList.remove('visible');
      const old = frame.src; frame.src = '';
      if (old.startsWith('blob:')) URL.revokeObjectURL(old);
    }

    loadNotes();
  </script>
</body>
</html>
