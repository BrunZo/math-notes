<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes Pipeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    section { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 1.25rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; }
    input[type=text], input[type=password], input[type=number] {
      width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.9rem; margin-bottom: 0.75rem;
    }
    input[type=file] { margin-bottom: 0.75rem; font-size: 0.9rem; }
    select {
      width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #ccc; border-radius: 4px;
      font-size: 0.9rem; margin-bottom: 0.75rem; background: #fff;
    }
    .row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .row > div { flex: 1; }
    button {
      padding: 0.45rem 1rem; border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.9rem; background: #333; color: #fff;
    }
    button:hover { background: #555; }
    button.secondary { background: #fff; color: #333; border: 1px solid #ccc; }
    button.secondary:hover { background: #f0f0f0; }
    #upload-result { margin-top: 0.75rem; font-size: 0.85rem; }
    .ok { color: #2a7a2a; } .err { color: #c0392b; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
    th { text-align: left; border-bottom: 2px solid #e0e0e0; padding: 0.4rem 0.5rem; color: #555; }
    td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #f0f0f0; }
    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    }
    .badge-pending    { background: #fff3cd; color: #856404; }
    .badge-done       { background: #d1e7dd; color: #0a3622; }
    .badge-error      { background: #f8d7da; color: #842029; }
    .course-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .course-block { margin-bottom: 1.25rem; }
    details summary { cursor: pointer; font-weight: 600; padding: 0.3rem 0; }
    .view-link { display: inline-block; margin-top: 0.75rem; font-size: 0.85rem; color: #333; text-decoration: none; }
    .view-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Notes Pipeline</h1>

  <!-- Token -->
  <section>
    <h2>Auth</h2>
    <label for="token">Secret token</label>
    <input type="password" id="token" placeholder="paste token here" autocomplete="off" onchange="loadCourses()">
  </section>

  <!-- Upload -->
  <section>
    <h2>Upload lecture</h2>
    <div class="row">
      <div>
        <label>Course ID</label>
        <input type="text" id="course_id" placeholder="course_id">
      </div>
      <div>
        <label>Lecture #</label>
        <input type="number" id="lecture_num" min="1" value="1">
      </div>
      <div>
        <label>Fidelity</label>
        <select id="fidelity">
          <option value="conservative">Conservative</option>
          <option value="standard" selected>Standard</option>
          <option value="liberal">Liberal</option>
        </select>
      </div>
      <div>
        <label>Images (jpg / png / webp)</label>
        <input type="file" id="file" accept="image/jpeg,image/png,image/webp" multiple>
      </div>
    </div>
    <button onclick="uploadJob()">Upload</button>
    <div id="upload-result"></div>
  </section>

  <!-- Courses -->
  <section>
    <div class="course-header">
      <h2>Courses</h2>
      <button class="secondary" onclick="loadCourses()">Refresh</button>
    </div>
    <div id="courses"><em style="color:#999;font-size:.85rem">Press Refresh to load.</em></div>
  </section>

  <script>
    function token() { return document.getElementById('token').value.trim(); }
    function headers() { return { 'Authorization': 'Bearer ' + token() }; }
    function badge(status) { return `<span class="badge badge-${status}">${status}</span>`; }

    async function uploadJob() {
      const result = document.getElementById('upload-result');
      const fileList = document.getElementById('file').files;
      if (!fileList.length) { result.innerHTML = '<span class="err">Select at least one file.</span>'; return; }

      const fd = new FormData();
      fd.append('course_id',   document.getElementById('course_id').value.trim());
      fd.append('lecture_num', document.getElementById('lecture_num').value);
      fd.append('fidelity',    document.getElementById('fidelity').value);
      for (const f of fileList) fd.append('files', f);

      result.innerHTML = 'Uploading…';
      try {
        const r = await fetch('/jobs', { method: 'POST', headers: headers(), body: fd });
        const data = await r.json();
        if (r.ok) {
          const n = data.files.length;
          result.innerHTML = `<span class="ok">Queued ${n} page${n !== 1 ? 's' : ''} for transcription.</span>`;
          loadCourses();
        } else {
          result.innerHTML = `<span class="err">Error ${r.status}: ${data.detail}</span>`;
        }
      } catch (e) {
        result.innerHTML = `<span class="err">${e}</span>`;
      }
    }

    async function loadCourses() {
      const el = document.getElementById('courses');
      el.innerHTML = 'Loading…';
      try {
        const r = await fetch('/courses', { headers: headers() });
        if (!r.ok) { el.innerHTML = `<span class="err">Error ${r.status}</span>`; return; }
        const courses = await r.json();
        if (!courses.length) { el.innerHTML = '<em style="color:#999;font-size:.85rem">No courses yet.</em>'; return; }
        el.innerHTML = '';
        for (const c of courses) await renderCourse(c, el);
      } catch (e) {
        el.innerHTML = `<span class="err">${e}</span>`;
      }
    }

    async function renderCourse(c, container) {
      const block = document.createElement('div');
      block.className = 'course-block';

      const r = await fetch(`/courses/${c.id}/status`, { headers: headers() });
      const data = await r.json();
      const lectures = data.lectures || [];
      const done = lectures.filter(j => j.status === 'done').length;

      const rows = lectures.map(j => `
        <tr>
          <td>${j.lecture_num}</td>
          <td>${badge(j.status)}</td>
          <td style="color:#c0392b;font-size:.8rem">${j.error_msg || ''}</td>
        </tr>`).join('');

      block.innerHTML = `
        <details open>
          <summary>${c.name !== c.id ? `${c.name} <span style="font-weight:400;color:#aaa;font-size:.8rem">(${c.id})</span>` : `<code>${c.id}</code>`} <span style="font-weight:400;color:#888;font-size:.85rem">(${done}/${lectures.length} done)</span></summary>
          <table>
            <thead><tr><th>#</th><th>Status</th><th>Error</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${done > 0 ? `<a class="view-link" href="/courses/${c.id}/full">View lectures →</a>` : ''}
        </details>`;
      container.appendChild(block);
    }
  </script>
</body>
</html>
