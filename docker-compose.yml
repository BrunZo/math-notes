services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes

  parser:
    build: .
    command: python -m workflow.parser
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes
    depends_on:
      - api

  compiler:
    build: .
    command: python -m workflow.compiler
    env_file: .env
    environment:
      TECTONIC_CACHE_DIR: /srv/notes/.tectonic-cache
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes
    depends_on:
      - api

  debugger:
    build: .
    command: python -m workflow.debugger
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes
    depends_on:
      - api
