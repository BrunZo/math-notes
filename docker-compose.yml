services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes

  parser:
    build: .
    command: python -m workflow.ingestion.parser
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes
    depends_on:
      - api

  debugger:
    build: .
    command: python -m workflow.testing.debugger
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes
    depends_on:
      - api

  extractor:
    build: .
    command: python -m workflow.repr.extractor
    env_file: .env
    volumes:
      - ${NOTES_DIR:-/srv/notes}:/srv/notes
